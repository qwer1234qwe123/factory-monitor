<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Smart Factory Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #0d1117; color: #fff; }

        .header {
            background: #161b22;
            padding: 18px 40px;
            border-bottom: 1px solid #30363d;
            display: flex; align-items: center; gap: 12px;
        }
        .header h1 { font-size: 22px; color: #58a6ff; }
        #status-badge {
            margin-left: auto;
            padding: 6px 18px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 15px;
            background: #21262d;
        }
        .status-정상  { color: #3fb950; }
        .status-경고  { color: #d29922; }
        .status-위험  { color: #f85149; }
        .badge-정상   { background: #1a3a1f !important; color: #3fb950; border: 1px solid #3fb950; }
        .badge-경고   { background: #3a2e0a !important; color: #d29922; border: 1px solid #d29922; }
        .badge-위험   { background: #3a0d0a !important; color: #f85149; border: 1px solid #f85149; }

        .container { padding: 28px 40px; }

        /* 경고 배너 */
        #warning-banner {
            display: none;
            background: #3a2e0a;
            border: 1px solid #d29922;
            border-radius: 8px;
            padding: 12px 20px;
            margin-bottom: 20px;
            color: #d29922;
            font-size: 14px;
        }
        #warning-banner.danger {
            background: #3a0d0a;
            border-color: #f85149;
            color: #f85149;
        }

        /* 센서 카드 */
        .cards {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 18px;
        }
        .card h3 { font-size: 12px; color: #8b949e; margin-bottom: 8px; }
        .card .value { font-size: 26px; font-weight: bold; color: #e6edf3; }
        .card .unit  { font-size: 12px; color: #8b949e; margin-top: 4px; }

        /* 차트 영역 */
        .charts {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }
        .chart-box {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 20px;
        }
        .chart-box h3 { font-size: 13px; color: #8b949e; margin-bottom: 14px; }

        /* 테이블 */
        table { width: 100%; border-collapse: collapse; background: #161b22; border-radius: 10px; overflow: hidden; }
        th { background: #21262d; padding: 11px 14px; text-align: left; color: #8b949e; font-size: 12px; }
        td { padding: 10px 14px; border-top: 1px solid #30363d; font-size: 13px; }

        #last-update { font-size: 12px; color: #8b949e; margin-bottom: 14px; }

/* 팝업 오버레이 */
#chat-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    justify-content: center;
    align-items: center;
}
#chat-overlay.open { display: flex; }

/* 팝업 박스 */
#chat-popup {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 14px;
    width: 700px;
    max-width: 95vw;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
#chat-popup-header {
    padding: 16px 20px;
    background: #21262d;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-weight: bold;
    font-size: 15px;
}
#chat-popup-header button {
    background: none;
    border: none;
    color: #8b949e;
    font-size: 20px;
    cursor: pointer;
}
#chat-report {
    padding: 20px;
    border-bottom: 1px solid #30363d;
    font-size: 13px;
    line-height: 1.7;
    max-height: 280px;
    overflow-y: auto;
}
#chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 120px;
}
.msg-user {
    align-self: flex-end;
    background: #1f6feb;
    color: #fff;
    padding: 8px 14px;
    border-radius: 14px 14px 2px 14px;
    max-width: 80%;
    font-size: 13px;
}
.msg-ai {
    align-self: flex-start;
    background: #21262d;
    color: #e6edf3;
    padding: 8px 14px;
    border-radius: 14px 14px 14px 2px;
    max-width: 80%;
    font-size: 13px;
    line-height: 1.6;
}
#chat-input-area {
    padding: 12px 16px;
    border-top: 1px solid #30363d;
    display: flex;
    gap: 8px;
}
#chat-input {
    flex: 1;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 8px 12px;
    color: #fff;
    font-size: 13px;
    outline: none;
}
#chat-send {
    background: #1f6feb;
    border: none;
    color: #fff;
    padding: 8px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
}
    </style>
</head>
<body>

<div class="header">
    <h1>🏭 Smart Factory Monitor</h1>
    <span id="status-badge">연결 중...</span>
</div>

<div class="container">

    <!-- 경고 배너 -->
    <div id="warning-banner"></div>
    <!-- 리포트 버튼 -->
    <div style="margin-bottom: 20px;">
        <button id="report-btn" onclick="generateReport()"
            style="background:#1f6feb;border:none;color:#fff;padding:10px 24px;border-radius:8px;font-size:14px;cursor:pointer;">
            🤖 Gemini 정비 리포트 생성
        </button>
    </div>

    <!-- 리포트 출력 영역 -->
    <div id="report-box" style="display:none;background:#161b22;border:1px solid #30363d;border-radius:10px;padding:20px;margin-bottom:20px;white-space:pre-wrap;font-size:14px;line-height:1.7;color:#e6edf3;"></div>
    <!-- 센서 카드 -->
    <div class="cards">
        <div class="card">
            <h3>진동 X</h3>
            <div class="value" id="vib-x">-</div>
            <div class="unit">g</div>
        </div>
        <div class="card">
            <h3>진동 Y</h3>
            <div class="value" id="vib-y">-</div>
            <div class="unit">g</div>
        </div>
        <div class="card">
            <h3>진동 Z</h3>
            <div class="value" id="vib-z">-</div>
            <div class="unit">g</div>
        </div>
        <div class="card">
            <h3>온도</h3>
            <div class="value" id="temp">-</div>
            <div class="unit">°C</div>
        </div>
        <div class="card">
            <h3>전류</h3>
            <div class="value" id="curr">-</div>
            <div class="unit">A</div>
        </div>
    </div>

    <!-- 차트 -->
    <div class="charts">
        <div class="chart-box">
            <h3>🌡 온도 추이 (최근 20개)</h3>
            <canvas id="tempChart" height="120"></canvas>
        </div>
        <div class="chart-box">
            <h3>⚡ 전류 추이 (최근 20개)</h3>
            <canvas id="currChart" height="120"></canvas>
        </div>
    </div>

    <div id="last-update"></div>

    <!-- 최근 데이터 테이블 -->
    <table>
        <thead>
            <tr>
                <th>시간</th>
                <th>디바이스</th>
                <th>진동X</th>
                <th>진동Y</th>
                <th>진동Z</th>
                <th>온도</th>
                <th>전류</th>
                <th>상태</th>
                <th>메시지</th>
            </tr>
        </thead>
        <tbody id="data-table"></tbody>
    </table>
</div>

<script>
// ── Chart.js 초기화 ──────────────────────────────────────
const chartOpts = (label, color) => ({
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label,
            data: [],
            borderColor: color,
            backgroundColor: color + '22',
            borderWidth: 2,
            pointRadius: 2,
            tension: 0.3,
            fill: true
        }]
    },
    options: {
        animation: false,
        plugins: { legend: { display: false } },
        scales: {
            x: { ticks: { color: '#8b949e', maxTicksLimit: 6 }, grid: { color: '#21262d' } },
            y: { ticks: { color: '#8b949e' }, grid: { color: '#21262d' } }
        }
    }
});

const tempChart = new Chart(document.getElementById('tempChart'), chartOpts('온도', '#58a6ff'));
const currChart = new Chart(document.getElementById('currChart'), chartOpts('전류', '#3fb950'));

// ── 데이터 업데이트 ──────────────────────────────────────
function statusClass(status) {
    if (status === '위험') return 'status-위험';
    if (status === '경고') return 'status-경고';
    return 'status-정상';
}

function updateCharts(dataList) {
    const reversed = [...dataList].reverse(); // 오래된 것 → 최신 순
    const labels  = reversed.map(d => d.recordedAt ? d.recordedAt.substring(11, 19) : '');
    const temps   = reversed.map(d => d.temperature);
    const currs   = reversed.map(d => d.current);

    tempChart.data.labels = labels;
    tempChart.data.datasets[0].data = temps;
    tempChart.update();

    currChart.data.labels = labels;
    currChart.data.datasets[0].data = currs;
    currChart.update();
}

function updateTable(dataList) {
    const tbody = document.getElementById('data-table');
    tbody.innerHTML = dataList.map(d => `
        <tr>
            <td>${d.recordedAt ? d.recordedAt.substring(0, 19).replace('T', ' ') : '-'}</td>
            <td>${d.deviceId ?? '-'}</td>
            <td>${d.vibrationX ?? '-'}</td>
            <td>${d.vibrationY ?? '-'}</td>
            <td>${d.vibrationZ ?? '-'}</td>
            <td>${d.temperature ?? '-'}</td>
            <td>${d.current ?? '-'}</td>
            <td class="${statusClass(d.status)}">${d.status ?? '-'}</td>
            <td>${d.message ?? '-'}</td>
        </tr>
    `).join('');
}

function updateLatest(d) {
    document.getElementById('vib-x').textContent = d.vibrationX ?? '-';
    document.getElementById('vib-y').textContent = d.vibrationY ?? '-';
    document.getElementById('vib-z').textContent = d.vibrationZ ?? '-';
    document.getElementById('temp').textContent  = d.temperature ?? '-';
    document.getElementById('curr').textContent  = d.current ?? '-';

    const badge = document.getElementById('status-badge');
    badge.textContent = d.status ?? '-';
    badge.className = 'badge-' + (d.status ?? '정상');

    // 경고 배너
    const banner = document.getElementById('warning-banner');
    if (d.status === '위험' || d.status === '경고') {
        banner.textContent = '⚠️ ' + (d.message ?? '');
        banner.className = d.status === '위험' ? 'danger' : '';
        banner.style.display = 'block';
    } else {
        banner.style.display = 'none';
    }
}

// ── 폴링 (5초) ──────────────────────────────────────────
async function fetchData() {
    try {
        const [latestRes, recentRes] = await Promise.all([
            fetch('api/sensor/latest'),
            fetch('api/sensor/recent')
        ]);
        const latest = await latestRes.json();
        const recent = await recentRes.json();

        if (latest) updateLatest(latest);
        if (recent?.length) {
            updateTable(recent);
            updateCharts(recent.slice(0, 20));
        }

        document.getElementById('last-update').textContent =
            '마지막 업데이트: ' + new Date().toLocaleTimeString('ko-KR');
    } catch (e) {
        console.error('데이터 조회 실패:', e);
    }
}

fetchData();
setInterval(fetchData, 5000);

// ── Gemini 리포트 생성 ───────────────────────────────────
let chatHistory = [];
let currentSensorData = null;

function closeChat() {
    document.getElementById('chat-overlay').classList.remove('open');
}

function renderMd(text) {
    return text
        .replace(/^## (.+)$/gm, '<h3 style="color:#58a6ff;margin-bottom:10px;">$1</h3>')
        .replace(/^### (.+)$/gm, '<h4 style="color:#8b949e;margin-bottom:8px;">$1</h4>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/^\* (.+)$/gm, '<li style="margin-left:20px;margin-bottom:4px;">$1</li>')
        .replace(/^(\d+)\. (.+)$/gm, '<li style="margin-left:20px;margin-bottom:6px;"><strong>$1.</strong> $2</li>')
        .replace(/\n\n/g, '<br><br>')
        .replace(/\n/g, '<br>');
}

async function sendChat() {
    const input = document.getElementById('chat-input');
    const messages = document.getElementById('chat-messages');
    const msg = input.value.trim();
    if (!msg || !currentSensorData) return;

    input.value = '';

    // 사용자 메시지
    messages.innerHTML += `<div class="msg-user">${msg}</div>`;
    messages.scrollTop = messages.scrollHeight;

    // AI 응답
    const sendBtn = document.getElementById('chat-send');
    sendBtn.disabled = true;
    sendBtn.textContent = '...';

    try {
        const payload = {
            message: msg,
            history: chatHistory,
            device_id:   currentSensorData.deviceId   ?? 'unknown',
            vibration_x: currentSensorData.vibrationX ?? 0,
            vibration_y: currentSensorData.vibrationY ?? 0,
            vibration_z: currentSensorData.vibrationZ ?? 0,
            temperature: currentSensorData.temperature ?? 0,
            current:     currentSensorData.current    ?? 0,
            status:      currentSensorData.status     ?? '정상'
        };

        const res = await fetch('api/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        const result = await res.json();
        const reply = result.reply ?? result.error ?? '응답 실패';

        messages.innerHTML += `<div class="msg-ai">${renderMd(reply)}</div>`;
        messages.scrollTop = messages.scrollHeight;

        // 히스토리 업데이트
        chatHistory.push({role: 'user',  parts: msg});
        chatHistory.push({role: 'model', parts: reply});
    } catch (e) {
        messages.innerHTML += `<div class="msg-ai">오류: ${e.message}</div>`;
    } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = '전송';
    }
}


async function generateReport() {
    const btn = document.getElementById('report-btn');
    const box = document.getElementById('report-box');

    btn.disabled = true;
    btn.textContent = '⏳ 리포트 생성 중...';

    try {
        const res = await fetch('api/sensor/latest');
        const d = await res.json();
        if (!d) { alert('센서 데이터 없음'); return; }

        currentSensorData = d;
        chatHistory = [];

        const payload = {
            device_id:   d.deviceId   ?? 'unknown',
            vibration_x: d.vibrationX ?? 0,
            vibration_y: d.vibrationY ?? 0,
            vibration_z: d.vibrationZ ?? 0,
            temperature: d.temperature ?? 0,
            current:     d.current    ?? 0,
            status:      d.status     ?? '정상',
            warnings:    d.message && d.message !== '정상 가동 중' ? [d.message] : []
        };

        const reportRes = await fetch('api/report', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        const result = await reportRes.json();
        const raw = result.report ?? result.error ?? '리포트 생성 실패';

        // 팝업 열기
        document.getElementById('chat-report').innerHTML = renderMd(raw);
        document.getElementById('chat-messages').innerHTML = '';
        document.getElementById('chat-overlay').classList.add('open');
    } catch (e) {
        alert('오류: ' + e.message);
    } finally {
        btn.disabled = false;
        btn.textContent = '🤖 Gemini 정비 리포트 생성';
    }

}

</script>

<!-- 채팅 팝업 -->
<div id="chat-overlay">
    <div id="chat-popup">
        <div id="chat-popup-header">
            <span>🤖 Gemini 정비 어시스턴트</span>
            <button onclick="closeChat()">✕</button>
        </div>
        <div id="chat-report"></div>
        <div id="chat-messages"></div>
        <div id="chat-input-area">
            <input id="chat-input" type="text" placeholder="정비 관련 질문을 입력하세요..." 
                onkeydown="if(event.key==='Enter') sendChat()">
            <button id="chat-send" onclick="sendChat()">전송</button>
        </div>
    </div>
</div>
</body>
</html>
